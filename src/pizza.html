
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.5.4/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
    <title>PizzaBestellseite</title>
    <link rel="stylesheet" href="bootstrap.css">
    <script src="script.js" defer></script>
</head>
<body style="font-family: 'Bahnschrift', cursive;">
<div class="container col-10">
    <form>
        <fieldset class="form-group border border-2 border-dark rounded-3 p-3 ">
            <legend class="float-none w-auto px-3">Persönliche Adressdaten</legend>
            <div class="row">
                <div class="row col-6 mb-2 align-items-center">
                    <label for="vorname" class="col-md-2 col-lg-2 col-xl-3 form-label">Vorname</label>
                    <input type="text" id="vorname" class="col form-control col-md-2 col-lg-3 col-xl-5" placeholder="Name">
                </div>
                <div class="row col mb-2 align-items-center offset-1">
                    <label for="geb" class="col-md-1 col-lg-1 col-xl-3 form-label">Geburtsdatum</label>
                    <input type="date" id="geb" class="col form-control col-md-2 col-lg-3 col-xl-5">
                </div>
            </div>
            <div class="row">
                <div class="row col-6 mb-2 align-items-center">
                    <label for="nachname" class="col-md-2 col-lg-2 col-xl-3 form-label">Nachname</label>
                    <input type="text" id="nachname" class="col form-control col-md-2 col-lg-3 col-xl-5" placeholder="Name...">
                </div>
                <div class="row col mb-2 align-items-center offset-1">
                    <label class="col-md-2 col-lg-2 col-xl-3 form-label">Geschlecht</label>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="inlineRadioOptions" id="mann" value="option1">
                        <label class="form-check-label" for="mann">m</label>
                    </div>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="inlineRadioOptions" id="frau" value="option2">
                        <label class="form-check-label" for="frau">w</label>
                    </div>
                </div>
            </div>
            <div class="row">
                <div class="row col-6 mb-2 align-items-center">
                    <label for="adress" class="col-md-2 col-lg-2 col-xl-3 form-label">Addresse</label>
                    <input type="text" id="adress" class="col form-control col-md-2 col-lg-3 col-xl-5" placeholder="Adresse...">
                </div>
            </div>
            <div class="row">
                <div class="row col-6 mb-2 align-items-center">
                    <label for="plz" class="col-md-2 col-lg-2 col-xl-3 form-label">Postleitzahl</label>
                    <input type="number" id="plz" class="col form-control col-md-2 col-lg-3 col-xl-5" placeholder="Postleitzahl...">
                </div>
            </div>
        </fieldset>
        <fieldset class="form-group border border-2 border-dark rounded-3 p-3 ">
            <legend class="float-none w-auto px-3">Daten zur Pizza</legend>
            <div class="row">
                <div class="row col-6 align-items-center">
                    <div class="row col-12">
                        <label for="pizza" class="col-md-2 col-lg-2 col-xl-3 form-label">Pizzenwahl</label>
                        <select class="form-control col-md-2 col-lg-3 col-xl-5" id="pizza">
                            <option selected>Pizza wählen...</option>
                            <option value="1">Margarita</option>
                            <option value="2">Pizza mit Shaggy-Whaggy-Sauce</option>
                            <option value="3">Schinken-Pizze</option>
                        </select>
                    </div>
                    <div class="col">
                            Extras
                        <div class="row">
                            <div class="col-3 form-check align-items-center ml-3 mt-2">
                                <input class="form-check-input" type="checkbox" value="Käse" id="käse" name="extra">
                                <label class="form-check-label" for="käse">Käse</label>
                            </div>
                            <div class="col-3 form-check align-items-center">
                                <input class="form-check-input" type="checkbox" value="Oliven" id="moz" name="extra">
                                <label class="form-check-label" for="moz">Oliven</label>
                            </div>
                            <div class="row col-4 form-check align-items-center">
                                <input class="form-check-input" type="checkbox" value="Salami" id="saul" name="extra">
                                <label class="form-check-label" for="saul">Salami</label>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-3 form-check align-items-center ml-3 mt-1">
                                <input class="form-check-input" type="checkbox" value="Pilze" id="ben" name="extra">
                                <label class="form-check-label" for="ben">Pilze</label>
                            </div>
                            <div class="col-3 form-check align-items-center mt-1">
                                <input class="form-check-input" type="checkbox" value="Thunfisch" id="tomate" name="extra">
                                <label class="form-check-label" for="tomate">Thunfisch</label>
                            </div>
                            <div class="row col-4 form-check align-items-center mt-1">
                                <input class="form-check-input" type="checkbox" value="shaggy-waggy-sauce" id="special" name="extra">
                                <label class="form-check-label" for="special">shaggy-waggy-sauce</label>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="row col mb-2 align-items-center offset-1">
                    <label for="textareas" class="form-label">Zusatzwünsche</label>
                    <textarea id="textareas" class="form-control mr-5" rows="5"></textarea>
                </div>
            </div>
            <div class="row">
                <div class="row col-6 align-items-center">
                    <div class="col mt-3">
                        Schärfeslider
                        <div class="row">
                            <input type="range" class="form-range col-md-1 col-lg-5 col-xl-7 ml-3" min="1" max="4" id="scharfe">
                        </div>
                    </div>
                </div>
                <div class="row col-5 mb-2 align-items-center offset-1">
                    <button type="button" class="btn btn-lg btn-info w-100" id="druckansicht">Bestellung Druckansicht</button>
                </div>
            </div>
        </fieldset>
        <div class="text-body ml-3">Übersicht der Bestelldaten</div>
        <fieldset class="border border-2 p-1 m-3 p-3">
            <div class="row rounded p-2 d-flex justify-content-center gap-1" id="background">
                <div class="col-12 col-md-9 row">
                    <div class="col-12" id="personendaten"></div>
                    <div class="col" id="bestelltext"></div>
                </div>
            </div>
        </fieldset>
    </form>
</div>
</body>
</html>
